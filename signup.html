<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#764ba2,#4CAF50);
            font-family:Arial;
        }

        .box{
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:15px;
            backdrop-filter:blur(10px);
            text-align:center;
            width:300px;
            color:white;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:8px;
            border:none;
            outline:none;
            transition:0.3s;
        }

        input.error-border{
            border:2px solid #ff4d4d;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            background:#fff;
            font-weight:bold;
            cursor:pointer;
        }

        .error{
            color:#ff4d4d;
            margin-top:10px;
            display:none;
        }

        .success{
            color:#00ff99;
            margin-top:10px;
            display:none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Create Account</h2>

    <form id="signupForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Signup</button>

        <div id="errorMsg" class="error">
            Username already exists
        </div>

        <div id="successMsg" class="success">
            Account created successfully!
        </div>
    </form>

    <p>Already have account? <a href="login.html" style="color:white;">Login</a></p>
</div>

<script>
    document.getElementById("signupForm").addEventListener("submit", function(e) {
        e.preventDefault(); // Form reload rok raha hai
    
        const username = document.getElementById("username");
        const password = document.getElementById("password");
    
        // Existing users localStorage se lo
        let users = JSON.parse(localStorage.getItem("users")) || [];
    
        // Check karo ki user already exist karta hai ya nahi
        let existingUser = users.find(user => user.username === username.value);
    
        if (existingUser) {
            // User already exists
            document.getElementById("errorisg").style.display = "block";
            username.classList.add("error-border");
        } else {
            // New user add karo
            users.push({ username: username.value, password: password.value });
            localStorage.setItem("users", JSON.stringify(users));
    
            // Messages
            document.getElementById("errorisg").style.display = "none";
            document.getElementById("successMsg").style.display = "block";
    
            // Redirect to login page after 1.2s
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1200);
        }
    });
    </script>
</body>
</html>
