<!DOCTYPE html>
<html>

<head>
    <title>RAZONSHOP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <ul>
                <li class="active"><a href="home.html">Home</a></li>
                <li><a href="about us.html">About Us</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="FAQ.html">FAQ</a></li>
                <li><a href="product.html">Products</a></li>         
            </ul>
        </div>

        <div id="profileContainer">
            <a href="login.html" id="authBtn">Login</a>
        </div>
    </nav>


    <section id="vid-par">
        <video id="my-vid" autoplay loop muted>
            <source type="video/mp4" src="Shubh - Bandana (Official Music Video).mp4">
        </video>
        <div id=vid-content></div>
        <div style="
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
       ">

            <H1 style="color: white"><br> Welcome to Razonshop</br></H1>

            <p style="color: white"><br>Build your dreams and make it real!</br></p>
            <script>
                let authBtn = document.getElementById("authBtn");

                if (localStorage.getItem("loggedIn") === "true") {
                    authBtn.textContent = "Profile";
                    authBtn.href = "#";
                }
            </script>
            <style>
                .profile-circle {
                    width: 45px;
                    height: 45px;
                    border-radius: 50%;
                    background: #4CAF50;
                    color: white;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    cursor: pointer;
                    font-weight: bold;
                    font-size: 18px;
                }

                .profile-dropdown {
                    display: none;
                    position: absolute;
                    right: 0;
                    margin-top: 10px;
                    background: white;
                    padding: 15px;
                    width: 180px;
                    border-radius: 10px;
                    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
                }

                .profile-dropdown p {
                    margin: 5px 0;
                    font-size: 14px;
                }

                .logout-btn {
                    margin-top: 10px;
                    padding: 5px;
                    width: 100%;
                    border: none;
                    background: red;
                    color: white;
                    border-radius: 5px;
                    cursor: pointer;
                }
            </style>

<script>
    let container = document.getElementById("profileContainer");
    
    if(localStorage.getItem("loggedIn") === "true"){
    
        let username = localStorage.getItem("currentUser");
    
        container.innerHTML = `
            <div class="profile-circle" id="avatar">
                ${username ? username.charAt(0).toUpperCase() : "U"}
            </div>
    
            <div class="profile-dropdown" id="dropdown">
                <p><strong>Name:</strong> ${username}</p>
                <button onclick="logout()">Logout</button>
            </div>
        `;
    
        document.getElementById("avatar").addEventListener("click", function(){
            let dropdown = document.getElementById("dropdown");
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
        });
    
    }else{
        container.innerHTML = `<a href="login.html">Login</a>`;
    }
    
    function logout(){
        localStorage.removeItem("loggedIn");
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
    }
    </script>

</body>

</html>
