<!DOCTYPE html>
<html>
<head>
    <title>RAZONSHOP - Contact</title>
    <link rel="stylesheet" href="stylecontact.css">
</head>
<body>

<!-- Animated background -->
<div class="animated-bg"></div>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-left">
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about us.html">About Us</a></li>
            <li><a href="search.html">Search</a></li>
            <li class="active"><a href="contact.html">Contact</a></li>
            <li><a href="FAQ.html">FAQ</a></li>
            <li><a href="product.html">Product</a></li>
        </ul>
    </div>

    <div id="profileContainer"></div>
</nav>

<!-- Email display -->
<section class="contact-section">
    <div class="container">
        <h1>Contact Us</h1>
        <p>Copy this email to compose your message:</p>
        <div class="email-box">rranonymous@gmail.com</div>
    </div>
</section>

<!-- Profile JS -->
<script>
    let container = document.getElementById("profileContainer");
    
    if(localStorage.getItem("loggedIn") === "true"){
    
        let username = localStorage.getItem("currentUser");
    
        container.innerHTML = `
            <div class="profile-circle" id="avatar">
                ${username ? username.charAt(0).toUpperCase() : "U"}
            </div>
    
            <div class="profile-dropdown" id="dropdown">
                <p><strong>Name:</strong> ${username}</p>
                <button onclick="logout()">Logout</button>
            </div>
        `;
    
        document.getElementById("avatar").addEventListener("click", function(){
            let dropdown = document.getElementById("dropdown");
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
        });
    
    }else{
        container.innerHTML = `<a href="login.html">Login</a>`;
    }
    
    function logout(){
        localStorage.removeItem("loggedIn");
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
    }
    </script>

</body>
</html>
